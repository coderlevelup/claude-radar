<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Kanban</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Claude Kanban</h1>
    </div>
    <div class="header-right">
      <div class="view-toggle">
        <button id="view-board" class="view-btn active" title="Board view">Board</button>
        <button id="view-timeline" class="view-btn" title="Timeline view">Timeline</button>
      </div>
      <label id="older-toggle" class="older-toggle">
        <input type="checkbox" id="show-older"> Show older
      </label>
      <span id="stats" class="stats"></span>
      <span id="pulse" class="pulse" title="Live"></span>
    </div>
  </header>
  <main id="board"></main>
  <div id="panel-overlay" class="panel-overlay hidden"></div>
  <aside id="panel" class="panel hidden">
    <div class="panel-header">
      <div class="panel-title-row">
        <h2 id="panel-title" class="panel-title"></h2>
        <button id="panel-close" class="panel-close">&times;</button>
      </div>
      <div id="panel-meta" class="panel-meta"></div>
    </div>
    <div id="panel-messages" class="panel-messages"></div>
  </aside>
  <script src="app.js"></script>
</body>
</html>
